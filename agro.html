<!DOCTYPE html>
<html>
<head>
    <title>Agro Marketplace</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        /* MAIN SITE */
        #mainSite {
            display: none;
            padding: 20px;
        }

        /* POPUP BACKGROUND */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* POPUP BOX */
        .modal-content {
            background: rgba(255, 255, 255, 0.926);
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: rgb(23, 0, 128);
            color: white;
            border: none;
        }

        .hidden {
            display: none;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<!-- POPUP MODAL -->
<div class="modal" id="authModal">

    <div class="modal-content">

        <!-- SIGNUP -->
        <div id="signupForm">
            <h2>Sign Up</h2>
            <input type="text" id="signupUser" placeholder="Username">
            <input type="password" id="signupPass" placeholder="Password">
            <p class="error" id="signupError"></p>
            <button onclick="signup()">Sign Up</button>
            <p>Have account? <a onclick="showLogin()">Login</a></p>
        </div>

        <!-- LOGIN -->
        <div id="loginForm" class="hidden">
            <h2>Login</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <p class="error" id="loginError"></p>
            <button onclick="login()">Login</button>
            <p>No account? <a onclick="showSignup()">Sign Up</a></p>
        </div>

    </div>

</div>

<!-- MAIN WEBSITE -->
<div id="mainSite">
    <h1>🌾 Welcome to My Agro Marketplace</h1>
    <p>You can now buy and sell farm products.</p>

    <button onclick="logout()">Logout</button>
</div>


f<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let correctUser = "admin";
    let correctPass = "1234";

    if (user === correctUser && pass === correctPass) {
        localStorage.setItem("loggedInUser", user);
        window.location.href = "home.html";
    } else {
        document.getElementById("error").innerText = "Wrong username or password";
    }
}
</script>

</body>
</html>
